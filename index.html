<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretty Face Korea</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f9fbfc;
      color: #333;
    }
    header {
      background: #ffffff;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .container {
      padding: 15px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      text-align: center;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }
    .kakao {
      background: #fee500;
      color: #000;
    }
    .section {
      margin-top: 20px;
    }
    .gallery img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      width: 100%;
      font-size: 16px;
    }
  </style>
</head>
<body><header>예쁜얼굴 (Pretty Face Korea)</header><div class="container"><a href="https://pf.kakao.com" class="btn kakao">Chat on KakaoTalk</a>

  <div class="section">
    <h3>About Us</h3>
    <p>We help international clients from the Middle East and Thailand receive premium plastic surgery in Korea.</p>
  </div>  <div class="section gallery">
    <h3>Clinic Gallery</h3>
    <img src="https://via.placeholder.com/300x200" alt="clinic">
    <img src="https://via.placeholder.com/300x200" alt="clinic">
    <img src="https://via.placeholder.com/300x200" alt="clinic">
  </div>  <div class="section">
    <h3>Reservation</h3>
    <form>
      <input type="text" placeholder="Name" required>
      <input type="text" placeholder="Country" required>
      <input type="email" placeholder="Email" required>
      <textarea placeholder="What procedure are you interested in?"></textarea>
      <button type="submit">Submit</button>
    </form>
  </div></div></body>
</html>
